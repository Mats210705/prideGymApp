spring.application.name=pridegym-backend
server.port=${PORT:8080}

# H2 Database - en memoria
spring.datasource.url=jdbc:h2:mem:pridegymdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT - en produccion pasar JWT_SECRET como env var
app.jwt.secret=${JWT_SECRET:pridegym-super-secret-key-que-debe-tener-al-menos-256-bits-para-hs256-algo}
app.jwt.expiration-ms=86400000

# CORS - lista separada por comas de origenes permitidos
app.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}

# Logging
logging.level.org.springframework.security=INFO
